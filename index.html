<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#101418">
  <meta name="description" content="Quick Metlink stop checker for your saved Wellington stops.">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon-192.svg">
  <link rel="stylesheet" href="./styles.css">
  <title>Met-sync</title>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Met-sync</p>
        <h1>Favourite stops</h1>
        <p id="lastUpdated" class="meta meta-quiet" aria-live="polite">Updated not yet</p>
      </div>
      <nav class="topbar-actions" aria-label="Primary">
        <a class="button button-secondary icon-button" href="./settings" aria-label="Open settings" title="Settings">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M19.14 12.94a7.94 7.94 0 0 0 .06-.94 7.94 7.94 0 0 0-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.2 7.2 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.49-.42h-3.84a.5.5 0 0 0-.49.42l-.36 2.54a7.2 7.2 0 0 0-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.94 7.94 0 0 0-.06.94c0 .32.02.63.06.94L2.83 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.39 1.05.7 1.63.94l.36 2.54a.5.5 0 0 0 .49.42h3.84a.5.5 0 0 0 .49-.42l.36-2.54c.58-.24 1.13-.55 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.2A3.2 3.2 0 1 1 12 8.8a3.2 3.2 0 0 1 0 6.4Z" fill="currentColor"/>
          </svg>
        </a>
        <button id="refreshButton" class="button icon-button" type="button" aria-label="Refresh arrivals" title="Refresh">
          <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M17.65 6.35A7.95 7.95 0 0 0 12 4V1L7 6l5 5V7a5 5 0 1 1-4.9 6h-2.02A7 7 0 1 0 17.65 6.35Z" fill="currentColor"/>
          </svg>
        </button>
      </nav>
    </header>

    <p id="statusMessage" class="status status-floating" aria-live="polite">Loading stops…</p>

    <section id="stopsContainer" class="stops-list panel-tight" aria-live="polite"></section>

    <section id="setupMessage" class="panel empty-state setup-message" hidden>
      <h2>Set up your stops</h2>
      <p>Add your Metlink API key and at least one favourite stop in Settings. Register for a token at <a href="https://opendata.metlink.org.nz/apis" target="_blank" rel="noreferrer">opendata.metlink.org.nz/apis</a>.</p>
      <a class="button" href="./settings">Open settings</a>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
